<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>점심 요가 설문 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#EFECE7;
--card:#FFFFFF;
--text:#1A1A1A;
--sub:#8C8A85;
--green:#3B6B4C;
--green-light:#D4E4D8;
--coral:#E07040;
--purple:#9B8ABF;
--pink:#E8B0C8;
--amber:#D4A843;
--teal:#6AACA0;
}
html,body{
min-height:100%;
font-family:'Noto Sans KR','DM Sans',sans-serif;
background:var(--bg);
color:var(--text);
-webkit-font-smoothing:antialiased;
}

.login-wrap{
min-height:100vh;display:flex;
align-items:center;justify-content:center;
padding:20px;
}
.login-box{
background:var(--card);
border-radius:4px;
padding:48px 40px;
width:100%;max-width:360px;
text-align:center;
}
.login-ico{
width:56px;height:56px;border-radius:50%;
background:var(--green);
display:flex;align-items:center;justify-content:center;
font-size:24px;margin:0 auto 20px;
}
.login-t{
font-family:'DM Sans',sans-serif;
font-size:20px;font-weight:700;margin-bottom:6px;
letter-spacing:-0.3px;
}
.login-s{font-size:13px;color:var(--sub);margin-bottom:28px;line-height:1.5}
.login-input{
width:100%;padding:12px 16px;
border:1.5px solid #DDDBD6;border-radius:4px;
background:var(--bg);
font-family:inherit;font-size:14px;
color:var(--text);outline:none;
transition:border-color 0.2s;
text-align:center;letter-spacing:4px;
}
.login-input:focus{border-color:var(--green)}
.login-input::placeholder{letter-spacing:0;color:#B0AEA9}
.login-btn{
width:100%;padding:13px;margin-top:12px;
border:none;border-radius:4px;
background:var(--green);color:#fff;
font-family:inherit;font-size:14px;font-weight:600;
cursor:pointer;transition:background 0.2s;
}
.login-btn:hover{background:#2E5840}
.login-btn:active{transform:scale(0.98)}
.login-err{font-size:12px;color:#D4544C;margin-top:12px;display:none}

.dash{display:none;max-width:1000px;margin:0 auto;padding:32px 24px 48px}

.dash-top{
display:flex;align-items:center;justify-content:space-between;
margin-bottom:8px;
}
.dash-t{
font-family:'DM Sans',sans-serif;
font-size:24px;font-weight:700;
letter-spacing:-0.5px;
}
.dash-actions{display:flex;gap:6px}
.act-btn{
padding:7px 14px;
border:1.5px solid #DDDBD6;border-radius:4px;
background:var(--card);
font-family:inherit;font-size:12px;color:var(--sub);
cursor:pointer;transition:all 0.15s;
}
.act-btn:hover{border-color:var(--green);color:var(--green)}

.dash-meta{font-size:12px;color:var(--sub);margin-bottom:24px}

.tabs{
display:flex;gap:0;
border-bottom:1.5px solid #DDDBD6;
margin-bottom:24px;
}
.tab-btn{
padding:10px 20px;border:none;
background:transparent;font-family:inherit;
font-size:13px;font-weight:500;color:var(--sub);
cursor:pointer;transition:all 0.15s;
border-bottom:2px solid transparent;
margin-bottom:-1.5px;
}
.tab-btn.on{color:var(--green);border-bottom-color:var(--green)}

.panel{display:none}
.panel.on{display:block}

.stats-row{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;margin-bottom:20px;
}
.stat-card{
background:var(--card);
border-radius:4px;
padding:24px;
position:relative;
}
.stat-card.hero{background:var(--green)}
.stat-card.hero .s-label{color:rgba(255,255,255,0.55)}
.stat-card.hero .s-num{color:#fff}
.s-label{
font-size:11px;color:var(--sub);
text-transform:uppercase;
letter-spacing:0.8px;
font-weight:500;
margin-bottom:8px;
}
.s-num{
font-family:'DM Sans',sans-serif;
font-size:40px;font-weight:700;
letter-spacing:-1px;
color:var(--text);
line-height:1;
}
.s-tag{
position:absolute;top:16px;right:16px;
width:28px;height:28px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-size:13px;
}

.chart-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;margin-bottom:20px;
}
.chart-card{
background:var(--card);
border-radius:4px;
padding:24px;
}
.chart-hdr{
display:flex;align-items:center;justify-content:space-between;
margin-bottom:16px;
}
.chart-title{font-size:13px;font-weight:600;color:var(--text)}
.chart-badge{
width:28px;height:28px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-size:12px;
}
.chart-wrap{position:relative;width:100%}

.tbl-wrap{
background:var(--card);
border-radius:4px;
overflow:hidden;
}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{border-bottom:1.5px solid #EEECEA}
th{
padding:12px 16px;text-align:left;
font-weight:600;color:var(--sub);
white-space:nowrap;font-size:11px;
text-transform:uppercase;
letter-spacing:0.5px;
}
td{
padding:11px 16px;
border-bottom:1px solid #F4F2EF;
color:var(--text);
max-width:160px;
overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
font-size:12px;
}
tr:last-child td{border-bottom:none}
@media(hover:hover){tr:hover td{background:#FAFAF8}}

.empty-msg{padding:60px 20px;text-align:center;color:var(--sub);font-size:13px}
.loading{text-align:center;padding:60px 20px;color:var(--sub);font-size:13px}

@media(max-width:700px){
.dash{padding:20px 14px 36px}
.dash-t{font-size:20px}
.chart-grid{grid-template-columns:1fr}
.stats-row{grid-template-columns:1fr 1fr}
.stats-row .stat-card:first-child{grid-column:1/-1}
.s-num{font-size:32px}
.login-box{padding:36px 28px}
}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-ico">🧘‍♀️</div>
    <div class="login-t">Survey Admin</div>
    <div class="login-s">설문 결과를 확인하려면<br>비밀번호를 입력하세요</div>
    <input class="login-input" id="pwInput" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="login-btn" onclick="tryLogin()">로그인</button>
    <div class="login-err" id="loginErr">비밀번호가 올바르지 않습니다</div>
  </div>
</div>

<div class="dash" id="dash">
  <div class="dash-top">
    <div class="dash-t">Lunchtime Yoga</div>
    <div class="dash-actions">
      <button class="act-btn" onclick="loadData()">↻ 새로고침</button>
      <button class="act-btn" onclick="logout()">로그아웃</button>
    </div>
  </div>
  <div class="dash-meta" id="metaText">불러오는 중...</div>

  <div class="tabs">
    <button class="tab-btn on" onclick="switchTab('stats',this)">통계</button>
    <button class="tab-btn" onclick="switchTab('list',this)">응답 목록</button>
  </div>

  <div class="panel on" id="panelStats">
    <div class="stats-row" id="statsRow"></div>
    <div class="chart-grid" id="chartGrid"></div>
  </div>

  <div class="panel" id="panelList">
    <div class="tbl-wrap">
      <div class="tbl-scroll" id="tblArea">
        <div class="loading">데이터를 불러오는 중...</div>
      </div>
    </div>
  </div>
</div>

<script>
var SHEET_URL='https://script.google.com/macros/s/AKfycbz_p7Hit6jIQtXV2hWmRAlTiIbhrAXRBHrA-YmQiuaAEb_J-LdDndGcZYcNqrZ8iRSq/exec';
var PASSWORD='yoga2026';
var rows=[];
var charts=[];

var tagColors=[
  {bg:'#D4E4D8',color:'#3B6B4C'},
  {bg:'#FAE0D0',color:'#E07040'},
  {bg:'#E8DDF2',color:'#7B68A6'},
  {bg:'#F6E0EC',color:'#C06090'},
  {bg:'#F0E6CC',color:'#A08530'}
];

function tryLogin(){
  var pw=document.getElementById('pwInput').value;
  if(pw===PASSWORD){
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('dash').style.display='block';
    loadData();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('pwInput').value='';
  }
}
function logout(){
  document.getElementById('dash').style.display='none';
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('pwInput').value='';
  document.getElementById('loginErr').style.display='none';
}
function switchTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  document.getElementById('panelStats').classList.toggle('on',tab==='stats');
  document.getElementById('panelList').classList.toggle('on',tab==='list');
}
function loadData(){
  document.getElementById('tblArea').innerHTML='<div class="loading">데이터를 불러오는 중...</div>';
  document.getElementById('metaText').textContent='불러오는 중...';
  fetch(SHEET_URL)
    .then(function(r){return r.json()})
    .then(function(data){
      rows=data;
      renderMeta();renderTable();renderStats();renderCharts();
    })
    .catch(function(){
      document.getElementById('tblArea').innerHTML='<div class="empty-msg">데이터를 불러오지 못했습니다</div>';
    });
}
function renderMeta(){
  var total=rows.length;
  var txt='총 '+total+'명 응답';
  if(total>0){
    var last=rows[total-1]['제출시간'];
    if(last){var d=new Date(last);txt+=' · 마지막 응답 '+d.toLocaleDateString('ko-KR');}
  }
  document.getElementById('metaText').textContent=txt;
}
function renderTable(){
  if(rows.length===0){document.getElementById('tblArea').innerHTML='<div class="empty-msg">아직 응답이 없습니다</div>';return;}
  var cols=['제출시간','언어','요가경험','선호강도','업무복귀 걱정','집중부위','주의사항','자유의견'];
  var h='<table><thead><tr><th>#</th>';
  for(var i=0;i<cols.length;i++) h+='<th>'+cols[i]+'</th>';
  h+='</tr></thead><tbody>';
  for(var j=rows.length-1;j>=0;j--){
    var r=rows[j];
    h+='<tr><td>'+(j+1)+'</td>';
    for(var k=0;k<cols.length;k++){
      var val=r[cols[k]]||'';
      if(cols[k]==='제출시간'&&val){var d=new Date(val);val=d.toLocaleDateString('ko-KR')+' '+d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});}
      h+='<td title="'+String(val).replace(/"/g,'&quot;')+'">'+val+'</td>';
    }
    h+='</tr>';
  }
  h+='</tbody></table>';
  document.getElementById('tblArea').innerHTML=h;
}
function renderStats(){
  var total=rows.length;var koCount=0,enCount=0;
  for(var i=0;i<rows.length;i++){if(rows[i]['언어']==='en')enCount++;else koCount++;}
  var html='';
  html+='<div class="stat-card hero"><div class="s-label">Total responses</div><div class="s-num">'+total+'</div><div class="s-tag" style="background:rgba(255,255,255,0.2)"><span style="color:#fff;font-size:14px">✦</span></div></div>';
  html+='<div class="stat-card"><div class="s-label">한국어</div><div class="s-num">'+koCount+'</div><div class="s-tag" style="background:'+tagColors[0].bg+'"><span style="color:'+tagColors[0].color+';font-size:14px">K</span></div></div>';
  html+='<div class="stat-card"><div class="s-label">English</div><div class="s-num">'+enCount+'</div><div class="s-tag" style="background:'+tagColors[1].bg+'"><span style="color:'+tagColors[1].color+';font-size:14px">E</span></div></div>';
  document.getElementById('statsRow').innerHTML=html;
}
function countField(field){
  var counts={};
  for(var i=0;i<rows.length;i++){
    var val=rows[i][field];if(!val)continue;
    var items=String(val).split(', ');
    for(var j=0;j<items.length;j++){var item=items[j].trim();if(item)counts[item]=(counts[item]||0)+1;}
  }
  return counts;
}

var palette=['#3B6B4C','#E07040','#9B8ABF','#E8B0C8','#D4A843','#6AACA0','#1A1A1A'];
var paletteSoft=['rgba(59,107,76,0.7)','rgba(224,112,64,0.7)','rgba(155,138,191,0.7)','rgba(232,176,200,0.7)','rgba(212,168,67,0.7)','rgba(106,172,160,0.7)','rgba(26,26,26,0.35)'];

function renderCharts(){
  for(var c=0;c<charts.length;c++){charts[c].destroy();}
  charts=[];
  var fields=[
    {key:'요가경험',title:'요가 경험',type:'doughnut',ti:0},
    {key:'선호강도',title:'선호 강도',type:'doughnut',ti:1},
    {key:'업무복귀 걱정',title:'업무 복귀 시 걱정',type:'bar',ti:2},
    {key:'집중부위',title:'집중 부위 (복수)',type:'bar',ti:3},
    {key:'주의사항',title:'주의 사항 (복수)',type:'bar',ti:4}
  ];
  var grid=document.getElementById('chartGrid');
  grid.innerHTML='';
  if(rows.length===0){grid.innerHTML='<div class="empty-msg">차트를 표시할 데이터가 없습니다</div>';return;}
  for(var f=0;f<fields.length;f++){
    var fi=fields[f];
    var counts=countField(fi.key);
    var labels=Object.keys(counts);
    var values=[];
    for(var l=0;l<labels.length;l++) values.push(counts[labels[l]]);
    if(labels.length===0) continue;
    var tc=tagColors[fi.ti%tagColors.length];
    var card=document.createElement('div');
    card.className='chart-card';
    card.innerHTML='<div class="chart-hdr"><div class="chart-title">'+fi.title+'</div><div class="chart-badge" style="background:'+tc.bg+'"><span style="color:'+tc.color+'">●</span></div></div><div class="chart-wrap"><canvas id="chart-'+f+'"></canvas></div>';
    grid.appendChild(card);
    var ctx=document.getElementById('chart-'+f).getContext('2d');
    var cfg;
    if(fi.type==='doughnut'){
      cfg={
        type:'doughnut',
        data:{labels:labels,datasets:[{data:values,backgroundColor:palette.slice(0,labels.length),borderColor:'#FFFFFF',borderWidth:3}]},
        options:{responsive:true,maintainAspectRatio:true,cutout:'65%',plugins:{legend:{position:'bottom',labels:{font:{family:'Noto Sans KR',size:11},padding:10,usePointStyle:true,pointStyleWidth:8}}}}
      };
    } else {
      var barColors=[];
      for(var b=0;b<labels.length;b++) barColors.push(paletteSoft[b%paletteSoft.length]);
      var canvasEl=document.getElementById('chart-'+f);
      canvasEl.style.height=(labels.length*40+36)+'px';
      cfg={
        type:'bar',
        data:{labels:labels,datasets:[{data:values,backgroundColor:barColors,borderColor:palette.slice(0,labels.length),borderWidth:1,borderRadius:2,barThickness:22}]},
        options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},
          scales:{x:{beginAtZero:true,ticks:{stepSize:1,font:{family:'DM Sans',size:11}},grid:{color:'rgba(0,0,0,0.04)'}},y:{ticks:{font:{family:'Noto Sans KR',size:11}},grid:{display:false}}}}
      };
    }
    charts.push(new Chart(ctx,cfg));
  }
}
</script>
</body>
</html>
